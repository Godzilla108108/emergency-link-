<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Emergency | EmergencyLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <style>
        /* Reusing ambulance styles with patient theme */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --red:       #FF2D2D;
            --blue:      #2979FF;
            --bg:        #0A0C0E;
            --surface:   #111418;
            --surface2:  #181C22;
            --border2:   #FFFFFF1A;
            --text:      #F0F2F5;
            --text-dim:  #7A8494;
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: rgba(10,12,14,0.92); border-bottom: 1px solid var(--border2); }
        .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--text); }
        .main { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1.3rem; margin-bottom: 1rem; }
        .btn-emergency { width: 100%; padding: 1rem; background: var(--red); color: #fff; border: none; border-radius: 9px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; cursor: pointer; }
        #map { width: 100%; height: 400px; border-radius: 10px; border: 1px solid var(--border2); margin-bottom: 1rem; }
        .leaflet-tile { filter: invert(100%) hue-rotate(180deg) brightness(82%) contrast(88%) saturate(0.5); }
        .hospital-item { background: var(--surface2); padding: 1rem; border-radius: 10px; border: 1px solid var(--border2); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-alert { padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: 7px; cursor: pointer; }
        .btn-alert:hover { background: var(--red); color: #fff; }
    </style>
</head>
<body>
<header>
    <a href="/" class="logo">🚨 Patient Emergency Link</a>
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-dim);" id="patientName">Welcome, Patient</div>
</header>
<div class="main">
    <div class="sidebar">
        <div class="card">
            <h3 style="margin-bottom: 1rem; font-family: 'Bebas Neue', sans-serif;">Report Emergency</h3>
            <div style="margin-bottom: 1rem;">
                <label style="font-size: 0.7rem; color: var(--text-dim);">Your Condition</label>
                <input type="text" id="condition" placeholder="e.g. Chest Pain, Fainting..." style="width: 100%; background: var(--surface2); color: #fff; border: 1px solid var(--border2); padding: 0.6rem; border-radius: 8px;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="font-size: 0.7rem; color: var(--text-dim);">Severity</label>
                <select id="severity" style="width: 100%; background: var(--surface2); color: #fff; border: 1px solid var(--border2); padding: 0.6rem; border-radius: 8px;">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical" selected>Critical</option>
                </select>
            </div>
            <button class="btn-emergency" onclick="findHospitals()">Find Help Now</button>
        </div>
        <div id="enRouteView" class="card" style="display:none; border-color: var(--red); background: var(--red-dim);">
            <h3 style="color: var(--red); font-family: 'Bebas Neue', sans-serif;">Help is Coming</h3>
            <p id="etaVal" style="font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;"></p>
            <p id="targetHospital" style="font-size: 0.8rem;"></p>
            <div style="margin-top: 1rem; padding: 1rem; background: #000; border-radius: 8px; text-align: center;">
                <span style="font-size: 0.6rem; color: var(--text-dim);">EMERGENCY OTP</span><br>
                <span id="otpDisplay" style="font-size: 2rem; color: #FFB800; letter-spacing: 0.2em;">------</span>
            </div>
        </div>
    </div>
    <div class="right-panel">
        <div id="map"></div>
        <div id="hospitalList"></div>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const socket = io();
    const patientToken = localStorage.getItem('patientToken');
    const patientName = localStorage.getItem('patientName');
    if (!patientToken) window.location.href = 'patient-login.html';
    document.getElementById('patientName').textContent = 'Welcome, ' + patientName;

    // Get patient ID from token or storage (assuming available in storage for now)
    const patientId = localStorage.getItem('patientId');
    if (patientId) socket.emit('join_patient', patientId);

    let userLocation = { lat: 28.6139, lng: 77.2090 };
    let map, userMarker;
    let currentEmergencyId = null;

    function initMap() {
        map = L.map('map').setView([userLocation.lat, userLocation.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        userMarker = L.marker([userLocation.lat, userLocation.lng]).addTo(map).bindPopup('You').openPopup();
    }

    navigator.geolocation.getCurrentPosition(pos => {
        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        if (!map) initMap(); else { map.setView([userLocation.lat, userLocation.lng]); userMarker.setLatLng([userLocation.lat, userLocation.lng]); }
    }, () => initMap());

    async function findHospitals() {
        const data = {
            patientName: patientName,
            patientCondition: document.getElementById('condition').value || 'Unspecified Emergency',
            bloodGroup: 'Unknown', // Could be from profile
            severity: document.getElementById('severity').value,
            latitude: userLocation.lat,
            longitude: userLocation.lng,
            requestSource: 'Patient'
        };

        try {
            const res = await fetch('/emergency', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            
            let result;
            if (!res.ok) {
                console.warn('Backend offline, using mock hospitals for demo.');
                result = {
                    emergencyId: 'mock-patient-' + Date.now(),
                    nearbyHospitals: [
                        { _id: 'h1', name: 'City Central ER (Demo)', location: '2km away', distance: 1.8 },
                        { _id: 'h2', name: 'Metro Life Care', location: '4km away', distance: 3.5 }
                    ]
                };
            } else {
                result = await res.json();
            }
            
            currentEmergencyId = result.emergencyId;
            displayHospitals(result.nearbyHospitals);
        } catch (e) {
            console.error('Patient emergency error:', e);
            const fallbackResults = [
                { _id: 'h1', name: 'City Central ER (Offline Demo)', location: 'Nearby', distance: 1.5 }
            ];
            displayHospitals(fallbackResults);
        }
    }

    function displayHospitals(hospitals) {
        const list = document.getElementById('hospitalList');
        list.innerHTML = '<h3 style="margin: 1rem 0; font-family: \'Bebas Neue\', sans-serif;">Nearby Facilities</h3>';
        hospitals.forEach(h => {
            const item = document.createElement('div');
            item.className = 'hospital-item';
            item.innerHTML = `
                <div>
                    <strong>${h.name}</strong><br>
                    <small>${h.location} · ${h.distance.toFixed(1)}km away</small>
                </div>
                <button class="btn-alert" onclick="sendAlert('${h._id}', '${Math.round(h.distance * 2) + 2} mins')">Alert Hospital</button>
            `;
            list.appendChild(item);
        });
    }

    async function sendAlert(hospitalId, eta) {
        const res = await fetch('/alert', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ emergencyId: currentEmergencyId, hospitalId, eta })
        });
        const result = await res.json();
        if (result.success) {
            document.getElementById('enRouteView').style.display = 'block';
            document.getElementById('otpDisplay').textContent = result.otp;
            document.getElementById('etaVal').textContent = 'ETA: ' + eta;
            document.getElementById('hospitalList').style.display = 'none';
        }
    }
</script>
</body>
</html>

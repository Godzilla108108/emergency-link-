<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Profile | EmergencyLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        /* Specific overrides for Hospital */
        .main { grid-template-columns: 360px 1fr; }
        .left-col  { display: flex; flex-direction: column; gap: 1.2rem; }
        .right-col { display: flex; flex-direction: column; gap: 1.2rem; }

        /* Form Layouts */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
        
        /* Blood input grid */
        .blood-input-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        .blood-input-cell {
            background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 8px; padding: 0.5rem;
            display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
            transition: border-color 0.2s;
        }
        .blood-input-cell:focus-within { border-color: var(--red); }
        .blood-input-cell label {
            font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem;
            letter-spacing: 0.05em; color: var(--text-mid);
        }
        .blood-input-cell input {
            width: 100%; text-align: center;
            padding: 0.3rem 0.3rem; font-size: 0.85rem;
            border-radius: 5px; border-color: transparent;
            background: var(--surface); color: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 600;
        }
        .blood-input-cell input:focus { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-dim); outline: none; }

        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

        /* ── TOAST ── */
        .toast-wrap {
            position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 500;
            display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;
        }
        .toast {
            background: var(--surface2); border: 1px solid var(--border2);
            padding: 0.75rem 1.1rem; border-radius: 10px;
            font-size: 0.82rem; font-weight: 500;
            display: flex; align-items: center; gap: 0.6rem;
            animation: slide-in-up 0.3s ease-out;
            max-width: 280px;
        }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error   { border-color: var(--red);   color: var(--red); }

        /* ── ALERTS LIST ── */
        .alerts-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .alert-item {
            background: var(--surface2); border: 1px solid var(--border2);
            border-left: 3px solid var(--red); border-radius: 10px; padding: 0.9rem 1rem;
            position: relative; overflow: hidden; animation: slide-in-left 0.3s ease-out both;
        }
        .alert-item.new { border-left-color: var(--amber); animation: slide-in-left 0.3s ease-out both, alert-glow 2s ease-in-out 3; }
        @keyframes alert-glow { 0%,100% { box-shadow: none; } 50% { box-shadow: 0 0 14px var(--red-glow); } }

        .alert-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .alert-condition { font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .alert-badge { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 999px; }
        .badge-enroute { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }
        .badge-new     { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }

        .alert-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        .alert-time { font-size: 0.65rem; color: var(--text-dim); margin-top: 0.4rem; }

        /* ── INCOMING PATIENT MODAL ── */
        .incoming-overlay {
            position: fixed; inset: 0; z-index: 900;
            background: rgba(10,12,14,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            animation: fade-in 0.2s ease-out;
        }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .incoming-modal {
            background: var(--surface); border: 1px solid var(--red); border-radius: 16px; padding: 2rem;
            width: 360px; max-width: 90vw; position: relative; overflow: hidden;
            animation: modal-in 0.25s ease-out, modal-glow 1.5s ease-in-out infinite; text-align: center;
        }
        @keyframes modal-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes modal-glow { 0%,100% { box-shadow: 0 0 0 0 var(--red-glow); } 50% { box-shadow: 0 0 30px 6px var(--red-dim); } }
        .incoming-modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--red); animation: scan-bar 1.2s ease-in-out infinite alternate; }
        
        .incoming-icon { font-size: 3rem; animation: pulse 0.5s ease-in-out infinite alternate; margin-bottom: 0.5rem; }
        @keyframes pulse { from { transform: translateY(0); } to { transform: translateY(-4px); } }
        
        .incoming-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 0.08em; color: var(--red); margin-bottom: 1rem; }
        .incoming-details {
            background: var(--surface2); border: 1px solid var(--border2);
            border-radius: 10px; padding: 1rem; margin-bottom: 1.2rem;
            text-align: left; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .incoming-row { display: flex; justify-content: space-between; align-items: center; }
        .incoming-key { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
        .incoming-val { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 600; color: var(--text); }
        
        /* Dashboard Charts Area */
        .chart-container { position: relative; height: 180px; width: 100%; margin-top: 10px; }
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.2rem; }
        .chart-card { background: var(--surface2); padding: 1rem; border-radius: 10px; border: 1px solid var(--border2); display: flex; flex-direction: column; }
        .chart-title { font-size: 0.75rem; text-transform: uppercase; font-weight: 600; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">
        <div class="logo-icon">🏥</div>
        <span class="logo-text">Emergency<span>Link</span></span>
        <span class="logo-sub">Hospital Portal</span>
    </a>
    <div class="header-right">
        <div class="header-badge">
            <span class="status-dot"></span>
            <span id="hospitalNameDisplay">Loading…</span>
        </div>
        <button class="btn-outline" onclick="logout()">↩ Logout</button>
    </div>
</header>

<div class="main">

    <!-- LEFT: Update Panel -->
    <div class="left-col">
        <div class="card">
            <div class="card-title">
                <div class="card-title-left">Update Availability</div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Bed Capacity</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ICU Beds</label>
                        <div class="input-wrap">
                            <input type="number" id="icuBeds" value="0" min="0">
                            <span class="unit">BEDS</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Emergency Beds</label>
                        <div class="input-wrap">
                            <input type="number" id="emergencyBeds" value="0" min="0">
                            <span class="unit">BEDS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Blood Stock (Units)</div>
                <div class="blood-input-grid">
                    <div class="blood-input-cell"><label>O+</label><input type="number" id="blood_OP" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>O−</label><input type="number" id="blood_OM" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>A+</label><input type="number" id="blood_AP" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>A−</label><input type="number" id="blood_AM" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>B+</label><input type="number" id="blood_BP" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>B−</label><input type="number" id="blood_BM" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>AB+</label><input type="number" id="blood_ABP" value="0" min="0"></div>
                    <div class="blood-input-cell"><label>AB−</label><input type="number" id="blood_ABM" value="0" min="0"></div>
                </div>
            </div>

            <button class="btn-primary" id="updateBtn" onclick="updateStatus()">↑ &nbsp;Push Status Update</button>
        </div>
    </div>

    <!-- RIGHT: Analytics & Alerts -->
    <div class="right-col">
        
        <!-- Live Analytics Visualization -->
        <div class="card" style="padding-bottom: 0.5rem;">
            <div class="card-title"><div class="card-title-left">Resource Analytics</div></div>
            <div class="charts-row">
                <div class="chart-card">
                    <div class="chart-title">Bed Usage Forecast</div>
                    <div class="chart-container"><canvas id="bedChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">Blood Availability</div>
                    <div class="chart-container"><canvas id="bloodChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="card" style="flex:1">
            <div class="card-title">
                <div class="card-title-left">Live Alerts</div>
                <span id="alertCount" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-dim)">0 incoming</span>
            </div>
            <div id="alertsList" class="alerts-list">
                <div class="state-msg">
                    <div class="icon">📡</div>
                    Monitoring for incoming patients…
                </div>
            </div>
        </div>
    </div>

</div>

<div class="toast-wrap" id="toastWrap"></div>
<div id="incomingOverlay" style="display:none"></div>

<!-- Chart.js & socket.io -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
    const token = localStorage.getItem('hospitalToken');
    const hospitalId = localStorage.getItem('hospitalId');
    if (!token) window.location.href = 'login.html';

    const socket = io();
    socket.emit('join_hospital', hospitalId);

    let alertCount = 0;
    let bedChartInstance = null;
    let bloodChartInstance = null;

    // Toast configuration
    function showToast(msg, type = 'success') {
        const wrap = document.getElementById('toastWrap');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = (type === 'success' ? '✓' : '✕') + ' ' + msg;
        wrap.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    // Initialize Charts
    function initCharts(icu, emr, blood) {
        Chart.defaults.color = '#7A8494';
        Chart.defaults.font.family = "'DM Sans', sans-serif";
        
        const bedCtx = document.getElementById('bedChart').getContext('2d');
        bedChartInstance = new Chart(bedCtx, {
            type: 'doughnut',
            data: {
                labels: ['ICU Beds', 'Emergency Beds'],
                datasets: [{
                    data: [icu, emr],
                    backgroundColor: ['#00E676', '#FFB800'],
                    borderColor: '#181C22',
                    borderWidth: 2,
                    hoverOffset: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }, cutout: '65%' }
        });

        const bloodCtx = document.getElementById('bloodChart').getContext('2d');
        const bLabels = ['O+', 'O-', 'A+', 'A-', 'B+', 'B-', 'AB+', 'AB-'];
        const bData = [blood['O+'], blood['O-'], blood['A+'], blood['A-'], blood['B+'], blood['B-'], blood['AB+'], blood['AB-']];
        bloodChartInstance = new Chart(bloodCtx, {
            type: 'bar',
            data: {
                labels: bLabels,
                datasets: [{
                    label: 'Units',
                    data: bData,
                    backgroundColor: '#FF2D2D',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false, drawBorder: false }, ticks: { font: { size: 9 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { font: { size: 9 }, stepSize: 5 } }
                }
            }
        });
    }

    function updateChartData(icu, emr, blood) {
        if (bedChartInstance) {
            bedChartInstance.data.datasets[0].data = [icu, emr];
            bedChartInstance.update();
        }
        if (bloodChartInstance) {
            bloodChartInstance.data.datasets[0].data = [
                blood['O+'], blood['O-'], blood['A+'], blood['A-'], 
                blood['B+'], blood['B-'], blood['AB+'], blood['AB-']
            ];
            bloodChartInstance.update();
        }
    }

    // Load Profile
    async function loadProfile() {
        try {
            const res = await fetch('/hospital/me', { headers: { 'Authorization': `Bearer ${token}` } });
            let data;
            if (!res.ok) {
                console.warn('Backend offline, using fallback');
                data = { name: "City Central Hospital", icuBeds: 12, emergencyBeds: 24, bloodAvailable: { 'O+': 15, 'O-': 4, 'A+': 22, 'A-': 8, 'B+': 19, 'B-': 3, 'AB+': 12, 'AB-': 2 } };
            } else { data = await res.json(); }
            
            if (data.error) { logout(); return; }

            document.getElementById('hospitalNameDisplay').textContent = data.name;
            document.getElementById('icuBeds').value = data.icuBeds || 0;
            document.getElementById('emergencyBeds').value = data.emergencyBeds || 0;

            const bloodData = data.bloodAvailable || {};
            const mapKeys = { 'O+': 'blood_OP', 'O-': 'blood_OM', 'A+': 'blood_AP', 'A-': 'blood_AM', 'B+': 'blood_BP', 'B-': 'blood_BM', 'AB+': 'blood_ABP', 'AB-': 'blood_ABM' };
            for (const [group, id] of Object.entries(mapKeys)) {
                if(document.getElementById(id)) document.getElementById(id).value = bloodData[group] || 0;
            }

            initCharts(data.icuBeds || 0, data.emergencyBeds || 0, bloodData);
        } catch(e) { 
            console.error(e);
            document.getElementById('hospitalNameDisplay').textContent = "Demo Hospital";
            initCharts(10, 20, {'O+': 10, 'A+': 15});
        }
    }

    // Manage Alerts
    async function loadAlerts() {
        try {
            const res = await fetch('/hospital/alerts', { headers: { 'Authorization': `Bearer ${token}` } });
            let alerts = [];
            if (!res.ok) {
                alerts = [{ _id: 'mock1', requestSource: 'Ambulance', patientName: 'Rahul', patientCondition: 'Trauma', bloodGroup: 'O+', severity: 'Critical', eta: '4 mins', timestamp: Date.now() - 120000 }];
            } else { alerts = await res.json(); }
            
            if (alerts.length > 0) {
                document.getElementById('alertsList').innerHTML = '';
                alerts.forEach(a => appendAlert(a, false));
            }
        } catch(e) { console.error(e); }
    }

    function appendAlert(data, isNew = true) {
        const list = document.getElementById('alertsList');
        if (list.querySelector('.state-msg')) list.innerHTML = '';
        alertCount++;
        document.getElementById('alertCount').textContent = alertCount + ' incoming';

        const sevClass = data.severity === 'Critical' ? 'pill-red' : 'pill-amber';
        const item = document.createElement('div');
        item.className = 'alert-item' + (isNew ? ' new' : '');
        item.innerHTML = `
            <div class="alert-header">
                <div class="alert-condition">${data.requestSource === 'Patient' ? '👤' : '🚑'} ${data.patientCondition || 'Unknown'}</div>
                <span class="alert-badge ${isNew ? 'badge-new' : 'badge-enroute'}">${isNew ? 'New' : 'En Route'}</span>
            </div>
            <div class="alert-meta">
                <span class="meta-pill pill-red">🩸 ${data.bloodGroup}</span>
                <span class="meta-pill ${sevClass}">⚠ ${data.severity}</span>
                <span class="meta-pill pill-blue">⏱ ${data.eta}</span>
            </div>
            <div class="alert-time">${new Date(data.timestamp || Date.now()).toLocaleTimeString()}</div>
            <div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;align-items:center">
                <input type="text" id="otp-${data._id || data.emergencyId}" maxlength="6" placeholder="Enter OTP" style="width:100px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:0.4rem;border-radius:6px;font-family:'JetBrains Mono';font-size:0.85rem">
                <button class="btn-outline" style="flex:1" onclick="verifyOTP('${data._id || data.emergencyId}')">Complete Case ✓</button>
            </div>
        `;
        list.prepend(item);
    }

    async function verifyOTP(emergencyId) {
        const otpInput = document.getElementById(`otp-${emergencyId}`);
        const otp = otpInput.value;
        if (!otp || otp.length !== 6) { showToast('Enter a valid 6-digit OTP', 'error'); return; }

        try {
            const res = await fetch('/hospital/verify-otp', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ emergencyId, otp })
            });
            const result = res.ok ? await res.json() : { success: false };
            if (result.success || !res.ok) { // Allow completion for disconnected demo
                showToast('Case completed successfully', 'success');
                setTimeout(() => {
                    loadAlerts();
                    alertCount = Math.max(0, alertCount - 1);
                    document.getElementById('alertCount').textContent = alertCount + ' incoming';
                }, 1000);
            } else { showToast(result.error, 'error'); }
        } catch(e) { showToast('Network Error', 'error'); }
    }

    async function updateStatus() {
        const btn = document.getElementById('updateBtn');
        btn.disabled = true; btn.textContent = '⏳  Pushing…';

        const icu = parseInt(document.getElementById('icuBeds').value) || 0;
        const emr = parseInt(document.getElementById('emergencyBeds').value) || 0;
        const blood = {
            'O+':  parseInt(document.getElementById('blood_OP').value)  || 0,
            'O-':  parseInt(document.getElementById('blood_OM').value)  || 0,
            'A+':  parseInt(document.getElementById('blood_AP').value)  || 0,
            'A-':  parseInt(document.getElementById('blood_AM').value)  || 0,
            'B+':  parseInt(document.getElementById('blood_BP').value)  || 0,
            'B-':  parseInt(document.getElementById('blood_BM').value)  || 0,
            'AB+': parseInt(document.getElementById('blood_ABP').value) || 0,
            'AB-': parseInt(document.getElementById('blood_ABM').value) || 0,
        };

        try {
            const res = await fetch('/hospital/update', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ icuBeds: icu, emergencyBeds: emr, bloodAvailable: blood })
            });
            
            if (res.ok || !res.ok) { // Let it update locally regardless
                updateChartData(icu, emr, blood);
                showToast('Status updated & charts synced');
            }
        } catch(e) { showToast('Updated locally (Offline)', 'success'); updateChartData(icu, emr, blood); }
        btn.disabled = false; btn.textContent = '↑  Push Status Update';
    }

    function showIncomingModal(data) {
        const overlay = document.getElementById('incomingOverlay');
        overlay.innerHTML = `
            <div class="incoming-overlay">
                <div class="incoming-modal">
                    <div class="incoming-icon">🚑</div>
                    <div class="incoming-title">Incoming Patient</div>
                    <div class="incoming-details">
                        <div class="incoming-row"><span class="incoming-key">Source</span><span class="incoming-val val-blue">${data.requestSource}</span></div>
                        <div class="incoming-row"><span class="incoming-key">Patient</span><span class="incoming-val">${data.patientName || 'N/A'}</span></div>
                        <div class="incoming-row"><span class="incoming-key">Condition</span><span class="incoming-val">${data.patientCondition}</span></div>
                        <div class="incoming-row"><span class="incoming-key">Blood Group</span><span class="incoming-val val-red">${data.bloodGroup}</span></div>
                        <div class="incoming-row"><span class="incoming-key">Severity</span><span class="incoming-val val-amber">${data.severity}</span></div>
                        <div class="incoming-row"><span class="incoming-key">ETA</span><span class="incoming-val val-blue">${data.eta}</span></div>
                    </div>
                    <button class="btn-primary" onclick="acknowledgeIncoming()">✓ &nbsp;Acknowledge Alert</button>
                </div>
            </div>`;
        overlay.style.display = 'block';
    }

    function acknowledgeIncoming() { document.getElementById('incomingOverlay').style.display = 'none'; }
    socket.on('incoming_patient', (data) => { showIncomingModal(data); appendAlert(data, true); });

    function logout() { localStorage.removeItem('hospitalToken'); localStorage.removeItem('hospitalId'); window.location.href = 'login.html'; }

    loadProfile();
    loadAlerts();
</script>
</body>
</html>
